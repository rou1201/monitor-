<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實時數據監控系統 | Y董團隊</title>
    <style>
        :root {
            --gold: #d4af37;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
        }

        #starfield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .main-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 40px 20px;
            height: 100vh;
            overflow-y: auto;
            box-sizing: border-box;
            scrollbar-width: none;
        }
        .main-container::-webkit-scrollbar { display: none; }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            color: var(--gold);
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            margin: 0;
        }

        .status-bar {
            font-size: 0.7rem;
            color: var(--neon-purple);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 6px; height: 6px;
            background-color: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .rtp-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }

        .hot-room {
            border: 1px solid var(--neon-purple);
            animation: neon-breathe 4s infinite ease-in-out;
        }

        @keyframes neon-breathe {
            0%, 100% { box-shadow: 0 0 5px var(--neon-purple); border-color: rgba(188, 19, 254, 0.3); }
            50% { box-shadow: 0 0 20px var(--neon-purple); border-color: rgba(188, 19, 254, 0.8); }
        }

        .room-info .name { font-size: 0.85rem; color: #bbb; }
        .rtp-number { font-size: 1.7rem; font-weight: 800; color: var(--gold); }

        .blurred { filter: blur(10px); opacity: 0.2; user-select: none; }
        
        .unlock-trigger {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            border-radius: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #0d0d0d;
            border: 1px solid var(--gold);
            width: 85%;
            max-width: 320px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .modal-btn {
            display: block;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin: 12px 0;
            font-size: 0.95rem;
        }

        .line-btn { background: #06C755; color: #fff; }
        .ig-btn { background: linear-gradient(45deg, #f09433, #bc1888); color: #fff; }

        footer {
            margin-top: 40px;
            padding-bottom: 40px;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="main-container">
    <header>
        <h1>SYSTEM MONITOR</h1>
        <div class="status-bar">
            <div class="live-dot"></div>
            <span>SERVER ONLINE | 數據對接中</span>
        </div>
    </header>

    <div class="rtp-card hot-room">
        <div class="room-info">
            <div class="name">賽特 102 號</div>
            <div style="color: var(--gold); font-size: 0.6rem; border: 1px solid var(--gold); display: inline-block; padding: 1px 4px; border-radius: 3px; margin-top: 4px;">HIGH VOLATILITY</div>
        </div>
        <div class="rtp-number">98.4%</div>
    </div>

    <div class="rtp-card" style="cursor: pointer;">
        <div class="room-info blurred">
            <div class="name">賽特 108 號</div>
            <div style="color: var(--gold); font-size: 0.6rem;">SECURED DATA</div>
        </div>
        <div class="rtp-number blurred">99.9%</div>
        <div class="unlock-trigger" onclick="openModal()">
            <span style="color: var(--gold); font-size: 0.9rem; font-weight: bold; text-shadow: 0 0 10px #000;">🔒 解鎖密鑰房間</span>
        </div>
    </div>

    <footer>
        <p style="font-size: 0.75rem; color: #888;">本系統由 <span style="color: var(--gold);">Y董團隊</span> 技術支援，數據僅供參考。</p>
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3 style="color: var(--gold); margin-bottom: 15px; letter-spacing: 2px;">密鑰驗證</h3>
        <p style="color: #aaa; font-size: 0.85rem; line-height: 1.6;">
            該房間數據受權限保護。<br>請聯繫負責人 <strong>Y董</strong> 領取密鑰。
        </p>
        <div style="margin: 25px 0;">
            <a href="https://reurl.cc/nlOQ5X" class="modal-btn line-btn">領取 Line 解鎖密鑰</a>
            <a href="https://www.instagram.com/agg.8989?igsh=aXI3NnExazNpYm1p&utm_source=qr" class="modal-btn ig-btn">私訊 IG：y董</a>
        </div>
        <span onclick="closeModal()" style="color: #444; font-size: 0.75rem; cursor: pointer;">返回監控首頁</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<120; i++) {
            stars.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                z: Math.random()*canvas.width
            });
        }
    }
    function move() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        stars.forEach(s => {
            let x = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
            let y = (s.y - canvas.height/2) * (canvas.width/s.z) + canvas.height/2;
            let sz = (1 - s.z/canvas.width) * 2;
            ctx.fillStyle = "rgba(255,255,255,"+(1-s.z/canvas.width)+")";
            ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
            s.z -= 1.2; if(s.z<=0) s.z = canvas.width;
        });
        requestAnimationFrame(move);
    }
    window.addEventListener('resize', init);
    init(); move();
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
