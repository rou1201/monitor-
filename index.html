<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG 戰神賽特智能監控系統 | Y董</title>
    <style>
        :root {
            --bg: #030308;
            --panel: rgba(10, 10, 25, 0.98);
            --gold: #d4af37;
            --s1: #ff0055; --s2: #ff5e00; --s3: #cc00ff; --s4: #00ccff; --s5: #00ffaa;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            overflow: hidden; height: 100%;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none;
        }

        .wrapper {
            max-width: 450px; margin: 0 auto; height: 100vh;
            display: flex; flex-direction: column; padding: 25px 20px; box-sizing: border-box;
            position: relative; z-index: 5;
        }

        header { 
            text-align: center; margin-bottom: 25px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 20px;
        }
        h1 { font-size: 1.4rem; letter-spacing: 4px; color: var(--gold); margin: 0; font-weight: 900; }

        #list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        #list::-webkit-scrollbar { display: none; }

        .card {
            background: var(--panel); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 5px solid #333;
            margin-bottom: 15px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 95% 100%, 0% 100%);
        }

        .info .id-text { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 5px; font-family: monospace; letter-spacing: 1px; }
        .info .tag { font-size: 0.95rem; font-weight: 900; letter-spacing: 1px; }
        .val { font-size: 2.2rem; font-weight: 900; font-family: 'Arial Black', sans-serif; }

        .state-1 { border-left-color: var(--s1); } .state-1 .val, .state-1 .tag { color: var(--s1); text-shadow: 0 0 10px var(--s1); }
        .state-2 { border-left-color: var(--s2); } .state-2 .val, .state-2 .tag { color: var(--s2); }
        .state-3 { border-left-color: var(--s3); } .state-3 .val, .state-3 .tag { color: var(--s3); }
        .state-4 { border-left-color: var(--s4); } .state-4 .val, .state-4 .tag { color: var(--s4); }
        .state-5 { border-left-color: var(--s5); } .state-5 .val, .state-5 .tag { color: var(--s5); text-shadow: 0 0 15px var(--s5); }

        .lock-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,15,0.98); display: flex; justify-content: center; align-items: center;
            z-index: 20; cursor: pointer;
        }
        .lock-btn {
            border: 1px solid var(--gold); color: var(--gold); padding: 10px 30px;
            font-size: 0.9rem; font-weight: 900; letter-spacing: 2px;
            background: rgba(212, 175, 55, 0.1);
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center;
        }
        .m-box { 
            background: #080810; border: 1px solid var(--gold); width: 85%; max-width: 320px; padding: 40px 25px; 
            text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .btn { display: block; padding: 16px; margin: 15px 0; text-decoration: none; font-weight: 900; font-size: 1rem; border-radius: 4px; border: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        .btn-l { background: #06C755; color: #fff; }
        .btn-i { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; }

        footer { text-align: center; padding: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.1); letter-spacing: 1px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
    <header>
        <h1>戰神賽特．智能監控</h1>
    </header>

    <div id="list"></div>

    <footer>本系統由 Y董團隊 提供技術支援</footer>
</div>

<div id="m" class="modal">
    <div class="m-box">
        <h2 style="color:var(--gold); font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 2px;">存取權限受限</h2>
        <p style="color:#666; font-size:0.8rem; margin-bottom:30px; line-height:1.6;">該房號數據已由密鑰加密<br>請聯繫 Y董 獲取永久解鎖權限</p>
        <a href="https://reurl.cc/nlOQ5X" class="btn btn-l" target="_blank">LINE 申請密鑰</a>
        <button class="btn btn-i" onclick="alert('請搜尋 IG 並私訊：agg.8989')">私訊 IG：agg.8989</button>
        <span onclick="toggleM(false)" style="color:#222; cursor:pointer; font-size:0.75rem; display:block; margin-top:20px;">[ 返回監控界面 ]</span>
    </div>
</div>

<script>
    (function() {
        const list = document.getElementById('list');
        const modal = document.getElementById('m');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        function getRandomRoom() { return Math.floor(Math.random() * 5000) + 1; }
        function getRandomRTP() { return (Math.random() * (95 - 60) + 60).toFixed(1); }

        function getS(v) {
            const n = parseFloat(v);
            if (n < 65) return { s: 'state-1', t: '極度危險' };
            if (n < 73) return { s: 'state-2', t: '數據低迷' };
            if (n < 81) return { s: 'state-3', t: '正常波動' };
            if (n < 88) return { s: 'state-4', t: '數據回升' };
            return { s: 'state-5', t: '高度活躍' };
        }

        function refreshList() {
            let html = '';
            for(let i=0; i<10; i++) {
                const id = getRandomRoom();
                const rtp = getRandomRTP();
                const isLocked = i >= 5;
                const info = getS(rtp);
                
                html += `
                    <div class="card ${info.s}">
                        <div class="info ${isLocked ? 'filter: blur(15px); opacity: 0.05;' : ''}">
                            <div class="id-text">監測編號：${id}</div>
                            <div class="tag">${info.t}</div>
                        </div>
                        <div class="val ${isLocked ? 'filter: blur(15px); opacity: 0.05;' : ''}">${rtp}%</div>
                        ${isLocked ? `<div class="lock-mask" onclick="toggleM(true)"><div class="lock-btn">點擊解鎖</div></div>` : ''}
                    </div>`;
            }
            list.innerHTML = html;
        }

        let pts = [];
        function initBg() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = [];
            for(let i=0; i<30; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+0.5});
        }
        function drawBg() {
            ctx.fillStyle = 'rgba(3,3,8,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                ctx.fillStyle = Math.random() > 0.5 ? '#d4af37' : '#ff0055';
                ctx.globalAlpha = 0.1;
                ctx.fillRect(p.x, p.y, 1, 40);
                p.y -= p.s; if(p.y < -40) p.y = canvas.height;
            });
            requestAnimationFrame(drawBg);
        }

        window.toggleM = (s) => modal.style.display = s ? 'flex' : 'none';
        window.addEventListener('resize', initBg);
        
        initBg(); drawBg(); refreshList();
        setInterval(refreshList, 400);
    })();
</script>
</body>
</html>
