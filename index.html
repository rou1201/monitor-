<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG NEURAL LINK | Y董團隊</title>
    <style>
        :root { 
            --bg-dark: #050508;
            --panel-bg: rgba(10, 10, 15, 0.9);
            --gold: #d4af37;
            /* 5 態科技感配色 */
            --s1: #ff0055; /* 極低 - 桃紅 */
            --s2: #ff7700; /* 低迷 - 橙 */
            --s3: #cc00ff; /* 普通 - 紫 */
            --s4: #0088ff; /* 回升 - 藍 */
            --s5: #00ffcc; /* 活躍 - 螢光綠 */
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Consolas', 'PingFang TC', sans-serif; overflow: hidden; height: 100%; }
        
        /* 掃描線特效 */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        .wrapper { max-width: 480px; margin: 0 auto; padding: 30px 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; scrollbar-width: none; position: relative; z-index: 5; }
        .wrapper::-webkit-scrollbar { display: none; }

        header { text-align: left; margin-bottom: 30px; border-left: 4px solid var(--gold); padding-left: 15px; }
        h1 { font-size: 1.3rem; letter-spacing: 3px; color: #fff; margin: 0; text-transform: uppercase; }
        .status { font-size: 0.6rem; color: var(--gold); margin-top: 5px; letter-spacing: 1px; opacity: 0.8; }
        
        /* 賽博切角卡片 */
        .card { 
            background: var(--panel-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-bottom: 15px; 
            padding: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%);
            transition: all 0.3s ease;
        }

        .info .room-id { font-size: 0.8rem; color: #888; margin-bottom: 4px; font-weight: bold; }
        .info .state-tag { font-size: 0.65rem; font-weight: 900; letter-spacing: 1px; }

        .val { font-size: 1.8rem; font-weight: 900; transition: all 0.3s; }

        /* 5 態辨識顏色賦值 */
        .st-1 { border-left: 3px solid var(--s1); } .st-1 .val, .st-1 .state-tag { color: var(--s1); }
        .st-2 { border-left: 3px solid var(--s2); } .st-2 .val, .st-2 .state-tag { color: var(--s2); }
        .st-3 { border-left: 3px solid var(--s3); } .st-3 .val, .st-3 .state-tag { color: var(--s3); }
        .st-4 { border-left: 3px solid var(--s4); } .st-4 .val, .st-4 .state-tag { color: var(--s4); }
        .st-5 { border-left: 3px solid var(--s5); } .st-5 .val, .st-5 .state-tag { color: var(--s5); text-shadow: 0 0 10px var(--s5); }

        /* 鎖定動態 Hex 遮罩 */
        .lock-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); z-index: 20;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer;
        }
        .hex-bg { position: absolute; font-size: 0.6rem; color: #111; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; top: 10%; opacity: 0.6; }
        .lock-btn { border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; font-size: 0.75rem; font-weight: bold; background: rgba(0,0,0,0.5); z-index: 21; }
        .blur-content { filter: blur(10px); opacity: 0.2; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; }
        .m-box { 
            background: #000; border: 1px solid var(--gold); width: 80%; max-width: 320px; padding: 40px 20px; text-align: center;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .m-btn { display: block; padding: 15px; text-decoration: none; font-weight: bold; margin: 12px 0; font-size: 0.9rem; text-align: center; }
        .btn-line { background: #06C755; color: #fff; }
        .btn-ig { border: 1px solid #ff0055; color: #ff0055; }

        footer { margin-top: 20px; text-align: left; opacity: 0.3; font-size: 0.6rem; letter-spacing: 1px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="wrapper">
    <header>
        <h1>Y-CORP // NEURAL_LINK</h1>
        <div class="status">DECODING REAL-TIME RTP DATA... [v4.0.2]</div>
    </header>
    
    <div id="list"></div>

    <footer>
        <p>AUTHORED BY 柔 / 去標誌化純淨代碼<br>ENCRYPTED ACCESS ONLY.</p>
    </footer>
</div>

<div id="m" class="modal">
    <div class="m-box">
        <h3 style="color:var(--gold); margin-bottom:10px; letter-spacing:2px;">ACCESS DENIED</h3>
        <p style="color:#444; font-size:0.7rem; margin-bottom:30px;">REQUIRED DECRYPTOR KEY NOT FOUND.</p>
        <a href="https://reurl.cc/nlOQ5X" class="m-btn btn-line" target="_blank">GET DECRYPTOR</a>
        <a href="https://www.instagram.com/agg.8989?igsh=aXI3NnExazNpYm1p&utm_source=qr" class="m-btn btn-ig" target="_blank">CONTACT ADMIN</a>
        <span onclick="toggleM(false)" style="color:#222; font-size:0.6rem; cursor:pointer; display:block; margin-top:20px;">[ TERMINATE ]</span>
    </div>
</div>

<script>
    (function() {
        const listContainer = document.getElementById('list');
        const modal = document.getElementById('m');
        
        // 生成 10 個房號 (5 開 5 鎖)
        const rooms = [102, 115, 128, 203, 245, 301, 318, 355, 382, 400].map((id, i) => ({
            id, rtp: (Math.random() * (93 - 60) + 60).toFixed(1), isLocked: i >= 5
        }));

        function getAnalysis(v) {
            const n = parseFloat(v);
            if (n < 65) return { cls: 'st-1', tag: 'CRITICAL_ZONE' };
            if (n < 73) return { cls: 'st-2', tag: 'DATA_LOW' };
            if (n < 81) return { cls: 'st-3', tag: 'STABLE_PULSE' };
            if (n < 88) return { cls: 'st-4', tag: 'REBOUND_MODE' };
            return { cls: 'st-5', tag: 'MAX_ACTIVITY' };
        }

        function genHex() {
            return Array.from({length: 30}, () => Math.floor(Math.random()*16).toString(16).toUpperCase()).join('');
        }

        function render() {
            listContainer.innerHTML = rooms.map(r => {
                const ana = getAnalysis(r.rtp);
                return `
                    <div class="card ${ana.cls}" id="card-${r.id}">
                        <div class="info ${r.isLocked ? 'blur-content' : ''}">
                            <div class="room-id">UNIT_SET-0${r.id}</div>
                            <div class="state-tag">${ana.tag}</div>
                        </div>
                        <div class="val ${r.isLocked ? 'blur-content' : ''}" id="v-${r.id}">${r.rtp}%</div>
                        ${r.isLocked ? `
                            <div class="lock-overlay" onclick="toggleM(true)">
                                <div class="hex-bg" id="hex-${r.id}"></div>
                                <div class="lock-btn">DECRYPT_DATA</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function sync() {
            rooms.forEach(r => {
                if (!r.isLocked) {
                    const drift = (Math.random() * 0.4 - 0.2);
                    r.rtp = Math.min(97, Math.max(55, parseFloat(r.rtp) + drift)).toFixed(1);
                    const vEl = document.getElementById(`v-${r.id}`);
                    if (vEl) vEl.innerText = r.rtp + '%';
                } else {
                    const hEl = document.getElementById(`hex-${r.id}`);
                    if (hEl) hEl.innerText = genHex();
                }
            });
        }

        window.toggleM = (s) => modal.style.display = s ? 'flex' : 'none';

        // 背景粒子引擎
        const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
        let particles = [];
        function initCV() {
            cv.width = window.innerWidth; cv.height = window.innerHeight;
            particles = Array.from({length: 60}, () => ({ x: Math.random()*cv.width, y: Math.random()*cv.height, z: Math.random()*cv.width }));
        }
        function draw() {
            ctx.fillStyle = "rgba(5, 5, 8, 0.3)";
            ctx.fillRect(0,0,cv.width,cv.height);
            particles.forEach(p => {
                let x = (p.x-cv.width/2)*(cv.width/p.z)+cv.width/2, y = (p.y-cv.height/2)*(cv.width/p.z)+cv.height/2, sz = (1-p.z/cv.width)*3;
                ctx.fillStyle = p.z < cv.width/2 ? "#ff0055" : "#d4af37";
                ctx.fillRect(x,y,sz,sz);
                p.z -= 1.5; if(p.z<=0) p.z = cv.width;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCV);
        initCV(); draw(); render();
        setInterval(sync, 150); // 代碼流與 RTP 實時刷新
    })();
</script>
</body>
</html>
