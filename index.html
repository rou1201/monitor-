<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG NEURAL INTERFACE | Y董</title>
    <style>
        :root {
            --bg: #020205;
            --panel: rgba(5, 5, 15, 0.85);
            --gold: #d4af37;
            --s1: #ff0055; /* 極度危險 */
            --s2: #ff5e00; /* 數據低迷 */
            --s3: #cc00ff; /* 正常波動 */
            --s4: #00ccff; /* 數據回升 */
            --s5: #00ffaa; /* 高度活躍 */
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Consolas', 'PingFang TC', sans-serif; 
            overflow: hidden; height: 100%;
        }

        /* 背景 Canvas 層 */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* 掃描線與噪點層 */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 10; pointer-events: none;
        }

        .wrapper {
            max-width: 450px; margin: 0 auto; height: 100vh;
            display: flex; flex-direction: column; padding: 25px 20px; box-sizing: border-box;
            position: relative; z-index: 5;
        }

        header { 
            text-align: left; margin-bottom: 25px; 
            border-left: 3px solid var(--gold); padding-left: 15px;
        }
        h1 { font-size: 1.3rem; letter-spacing: 2px; color: #fff; margin: 0; text-transform: uppercase; }
        .status { font-size: 0.6rem; color: var(--gold); margin-top: 5px; opacity: 0.8; letter-spacing: 1px; }

        #list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        #list::-webkit-scrollbar { display: none; }

        .card {
            background: var(--panel); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #333;
            margin-bottom: 16px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 95% 100%, 0% 100%);
        }

        .info .id-text { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .info .tag { font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; }

        .val { font-size: 1.8rem; font-weight: 900; }

        /* 五態配色固化 */
        .state-1 { border-left-color: var(--s1); } .state-1 .val, .state-1 .tag { color: var(--s1); text-shadow: 0 0 10px var(--s1); }
        .state-2 { border-left-color: var(--s2); } .state-2 .val, .state-2 .tag { color: var(--s2); }
        .state-3 { border-left-color: var(--s3); } .state-3 .val, .state-3 .tag { color: var(--s3); }
        .state-4 { border-left-color: var(--s4); } .state-4 .val, .state-4 .tag { color: var(--s4); }
        .state-5 { border-left-color: var(--s5); box-shadow: inset 0 0 15px rgba(0, 255, 170, 0.05); } 
        .state-5 .val, .state-5 .tag { color: var(--s5); text-shadow: 0 0 15px var(--s5); }

        /* 鎖定設計 */
        .lock-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center;
            z-index: 20; cursor: pointer;
        }
        .lock-btn {
            border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px;
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
        }
        .blur-content { filter: blur(10px); opacity: 0.1; }

        /* 彈窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center;
        }
        .m-box { 
            background: #08080c; border: 1px solid var(--gold); width: 80%; max-width: 300px; padding: 40px 20px; 
            text-align: center; clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .btn { display: block; padding: 14px; margin: 12px 0; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .btn-l { background: #06C755; color: #fff; }
        .btn-i { border: 1px solid var(--s1); color: var(--s1); }

        footer { text-align: left; padding: 10px; font-size: 0.55rem; color: rgba(255,255,255,0.2); text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
    <header>
        <h1>Y_CORP / NEURAL_LINK</h1>
        <div class="status">ENCRYPTED_STREAM_ID: 8989 // RTP_MONITOR</div>
    </header>

    <div id="list"></div>

    <footer>ACCESS_POINT: CLOUD_01 / AUTHORED BY 柔</footer>
</div>

<div id="m" class="modal">
    <div class="m-box">
        <h2 style="color:var(--gold); font-size: 1rem; margin-bottom: 20px;">AUTHORIZATION REQUIRED</h2>
        <a href="https://reurl.cc/nlOQ5X" class="btn btn-l" target="_blank">DECRYPT KEY</a>
        <a href="https://www.instagram.com/agg.8989/" class="btn btn-i" target="_blank">ADMIN LINK</a>
        <span onclick="toggleM(false)" style="color:#333; cursor:pointer; font-size:0.6rem; display:block; margin-top:15px;">TERMINATE CONNECTION</span>
    </div>
</div>

<script>
    (function() {
        const list = document.getElementById('list');
        const modal = document.getElementById('m');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        // 房號設定
        const data = [102, 115, 128, 205, 233, 301, 315, 366, 388, 400].map((id, i) => ({
            id, rtp: (Math.random() * (93 - 60) + 60).toFixed(1), lock: i >= 5
        }));

        // 背景動態電路引擎
        let particles = [];
        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<30; i++) particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 2 + 1,
                color: Math.random() > 0.5 ? '#ff0055' : '#00ccff'
            });
        }

        function drawBg() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 0.5;
                ctx.moveTo(p.x, p.y);
                p.y -= p.v;
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                
                if(p.y < 0) p.y = canvas.height;
                // 模擬電路轉折
                if(Math.random() > 0.98) p.x += (Math.random() - 0.5) * 20;
            });
            requestAnimationFrame(drawBg);
        }

        function getS(v) {
            const n = parseFloat(v);
            if (n < 65) return { s: 'state-1', t: 'CRITICAL_RISK' };
            if (n < 73) return { s: 'state-2', t: 'LOW_DENSITY' };
            if (n < 81) return { s: 'state-3', t: 'STABLE_WAVE' };
            if (n < 88) return { s: 'state-4', t: 'RECOVERING' };
            return { s: 'state-5', t: 'HIGH_ACTIVITY' };
        }

        function draw() {
            list.innerHTML = data.map(r => {
                const info = getS(r.rtp);
                return `
                    <div class="card ${info.s}" id="card-${r.id}">
                        <div class="info ${r.lock ? 'blur-content' : ''}">
                            <div class="id-text">TRACKING_UNIT: ${r.id}</div>
                            <div class="tag">${info.t}</div>
                        </div>
                        <div class="val ${r.lock ? 'blur-content' : ''}" id="v-${r.id}">${r.rtp}%</div>
                        ${r.lock ? `<div class="lock-mask" onclick="toggleM(true)"><div class="lock-btn">DECRYPT</div></div>` : ''}
                    </div>`;
            }).join('');
        }

        function sync() {
            data.forEach(r => {
                if(!r.lock) {
                    r.rtp = Math.min(97.5, Math.max(55, parseFloat(r.rtp) + (Math.random() * 0.4 - 0.2))).toFixed(1);
                    const el = document.getElementById(`v-${r.id}`);
                    const card = document.getElementById(`card-${r.id}`);
                    if(el && card) {
                        el.innerText = r.rtp + '%';
                        const next = getS(r.rtp);
                        card.className = `card ${next.s}`;
                        card.querySelector('.tag').innerText = next.t;
                    }
                }
            });
        }

        window.toggleM = (s) => modal.style.display = s ? 'flex' : 'none';
        window.addEventListener('resize', initBg);
        
        initBg(); drawBg(); draw();
        setInterval(sync, 200);
    })();
</script>
</body>
</html>
