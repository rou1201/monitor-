<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATG 戰神賽特智能監控系統 | Y董</title>
    <style>
        :root {
            --bg: #030308;
            --panel: rgba(8, 8, 20, 0.9);
            --gold: #d4af37;
            --s1: #ff0055; /* 極度危險 */
            --s2: #ff5e00; /* 數據低迷 */
            --s3: #cc00ff; /* 正常波動 */
            --s4: #00ccff; /* 數據回升 */
            --s5: #00ffaa; /* 高度活躍 */
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Consolas', 'PingFang TC', sans-serif; 
            overflow: hidden; height: 100%;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* 戰神賽特風格濾鏡 */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 100%, 100% 4px;
            z-index: 10; pointer-events: none;
        }

        .wrapper {
            max-width: 450px; margin: 0 auto; height: 100vh;
            display: flex; flex-direction: column; padding: 25px 20px; box-sizing: border-box;
            position: relative; z-index: 5;
        }

        header { 
            text-align: center; margin-bottom: 25px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px;
        }
        h1 { font-size: 1.25rem; letter-spacing: 3px; color: var(--gold); margin: 0; font-weight: 900; }
        .status { font-size: 0.6rem; color: #fff; margin-top: 8px; opacity: 0.6; letter-spacing: 2px; }

        #list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        #list::-webkit-scrollbar { display: none; }

        .card {
            background: var(--panel); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-left: 4px solid #333;
            margin-bottom: 14px; padding: 18px 22px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 94% 100%, 0% 100%);
        }

        .info .id-text { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-bottom: 2px; font-weight: bold; }
        .info .tag { font-size: 0.85rem; font-weight: 900; letter-spacing: 1px; }

        .val { font-size: 2rem; font-weight: 900; font-family: 'Arial Black', sans-serif; }

        /* 五態核心辨識 */
        .state-1 { border-left-color: var(--s1); } .state-1 .val, .state-1 .tag { color: var(--s1); text-shadow: 0 0 8px var(--s1); }
        .state-2 { border-left-color: var(--s2); } .state-2 .val, .state-2 .tag { color: var(--s2); }
        .state-3 { border-left-color: var(--s3); } .state-3 .val, .state-3 .tag { color: var(--s3); }
        .state-4 { border-left-color: var(--s4); } .state-4 .val, .state-4 .tag { color: var(--s4); }
        .state-5 { border-left-color: var(--s5); } .state-5 .val, .state-5 .tag { color: var(--s5); text-shadow: 0 0 12px var(--s5); }

        /* 鎖定邏輯視窗 */
        .lock-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,2,5,0.96); display: flex; justify-content: center; align-items: center;
            z-index: 20; cursor: pointer;
        }
        .lock-btn {
            border: 1px solid var(--gold); color: var(--gold); padding: 6px 20px;
            font-size: 0.8rem; font-weight: 900; letter-spacing: 1px;
            background: rgba(212, 175, 55, 0.05);
        }
        .blur-content { filter: blur(15px); opacity: 0.05; }

        /* 彈窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center;
        }
        .m-box { 
            background: #050508; border: 1px solid var(--gold); width: 80%; max-width: 300px; padding: 45px 20px; 
            text-align: center; clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
        }
        .btn { display: block; padding: 15px; margin: 12px 0; text-decoration: none; font-weight: 900; font-size: 1rem; }
        .btn-l { background: #06C755; color: #fff; }
        .btn-i { border: 1px solid var(--s1); color: var(--s1); }

        footer { text-align: center; padding: 15px; font-size: 0.6rem; color: #222; letter-spacing: 1px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="wrapper">
    <header>
        <h1>戰神賽特．RTP監控</h1>
        <div class="status">SYSTEM_STATUS: ENCRYPTED // LINKED TO Y-TEAM</div>
    </header>

    <div id="list"></div>

    <footer>BY Y董團隊 / AUTHORED BY 柔</footer>
</div>

<div id="m" class="modal">
    <div class="m-box">
        <h2 style="color:var(--gold); font-size: 1.1rem; margin-bottom: 25px; letter-spacing: 2px;">權限驗證失敗</h2>
        <a href="https://reurl.cc/nlOQ5X" class="btn btn-l" target="_blank">LINE 獲取密鑰</a>
        <a href="https://www.instagram.com/agg.8989/" class="btn btn-i" target="_blank">管理者私訊</a>
        <span onclick="toggleM(false)" style="color:#222; cursor:pointer; font-size:0.7rem; display:block; margin-top:20px;">[ 返回監測中斷 ]</span>
    </div>
</div>

<script>
    (function() {
        const list = document.getElementById('list');
        const modal = document.getElementById('m');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        const data = [102, 115, 128, 205, 233, 301, 315, 366, 388, 400].map((id, i) => ({
            id, rtp: (Math.random() * (94 - 61) + 61).toFixed(1), lock: i >= 5
        }));

        let circuits = [];
        function initBg() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            circuits = [];
            for(let i=0; i<40; i++) circuits.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                len: Math.random() * 100 + 50,
                speed: Math.random() * 2 + 0.5,
                color: i % 3 === 0 ? '#d4af37' : (i % 3 === 1 ? '#ff0055' : '#00ccff')
            });
        }

        function drawBg() {
            ctx.fillStyle = 'rgba(3, 3, 8, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            circuits.forEach(c => {
                ctx.beginPath();
                ctx.strokeStyle = c.color;
                ctx.globalAlpha = 0.2;
                ctx.lineWidth = 1;
                ctx.moveTo(c.x, c.y);
                c.y -= c.speed;
                ctx.lineTo(c.x, c.y + c.len);
                ctx.stroke();
                if(c.y + c.len < 0) c.y = canvas.height;
            });
            requestAnimationFrame(drawBg);
        }

        function getS(v) {
            const n = parseFloat(v);
            if (n < 65) return { s: 'state-1', t: '極度危險' };
            if (n < 73) return { s: 'state-2', t: '數據低迷' };
            if (n < 81) return { s: 'state-3', t: '正常波動' };
            if (n < 88) return { s: 'state-4', t: '數據回升' };
            return { s: 'state-5', t: '高度活躍' };
        }

        function draw() {
            list.innerHTML = data.map(r => {
                const info = getS(r.rtp);
                return `
                    <div class="card ${info.s}" id="card-${r.id}">
                        <div class="info ${r.lock ? 'blur-content' : ''}">
                            <div class="id-text">UNIT_ID: ${r.id}</div>
                            <div class="tag">${info.t}</div>
                        </div>
                        <div class="val ${r.lock ? 'blur-content' : ''}" id="v-${r.id}">${r.rtp}%</div>
                        ${r.lock ? `<div class="lock-mask" onclick="toggleM(true)"><div class="lock-btn">🔒 密鑰解鎖</div></div>` : ''}
                    </div>`;
            }).join('');
        }

        function sync() {
            data.forEach(r => {
                if(!r.lock) {
                    r.rtp = Math.min(98.2, Math.max(58, parseFloat(r.rtp) + (Math.random() * 0.4 - 0.2))).toFixed(1);
                    const el = document.getElementById(`v-${r.id}`);
                    const card = document.getElementById(`card-${r.id}`);
                    if(el && card) {
                        el.innerText = r.rtp + '%';
                        const next = getS(r.rtp);
                        card.className = `card ${next.s}`;
                        card.querySelector('.tag').innerText = next.t;
                    }
                }
            });
        }

        window.toggleM = (s) => modal.style.display = s ? 'flex' : 'none';
        window.addEventListener('resize', initBg);
        initBg(); drawBg(); draw();
        setInterval(sync, 200);
    })();
</script>
</body>
</html>
